<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masik | PS3 Portfolio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'Trebuchet MS','Arial',sans-serif;user-select:none;cursor:default;color:#fff}
#ps3{width:100vw;height:100vh;position:relative;overflow:hidden}
canvas#bg{position:absolute;inset:0;width:100%;height:100%;display:block}

/* BOOT */
#boot{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.b-ring{width:110px;height:110px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;margin-bottom:28px;position:relative;animation:ringPulse 2s ease-in-out infinite;}
.b-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(255,255,255,0.05);}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(80,130,255,0.1)}50%{box-shadow:0 0 30px 8px rgba(80,130,255,0.18)}}
.b-ps3{color:rgba(255,255,255,0.65);font-size:28px;font-weight:300;letter-spacing:6px;}
.b-sub{color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-bottom:30px;}
.b-dots{display:flex;gap:8px;}
.b-dots span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.25);animation:dp 1.4s ease-in-out infinite;}
.b-dots span:nth-child(2){animation-delay:.22s}
.b-dots span:nth-child(3){animation-delay:.44s}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* TOPBAR */
#topbar{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;z-index:10;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);}
.t-logo{color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:3px;text-transform:uppercase;}
.t-right{display:flex;align-items:center;gap:20px;}
.t-user{color:rgba(255,255,255,0.5);font-size:12px;letter-spacing:1px;display:flex;align-items:center;gap:7px;}
.t-user i{font-size:13px;opacity:.7;}
.t-clock{text-align:right;}
.tc-time{color:rgba(255,255,255,0.88);font-size:24px;font-weight:300;letter-spacing:1px;}
.tc-date{color:rgba(255,255,255,0.33);font-size:11px;}

/* NAV */
#nav-rail{position:absolute;top:50%;display:flex;align-items:center;pointer-events:all;}
.cat{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;}
.cat svg,.cat i.cat-icon{transition:all .3s cubic-bezier(.4,0,.2,1);display:block;}
.cat i.cat-icon{font-size:38px;color:rgba(170,205,255,.6);}
.c-name{color:rgba(255,255,255,0.4);font-size:10.5px;text-align:center;white-space:nowrap;text-shadow:0 1px 6px #000;transition:all .3s ease;line-height:1.3;pointer-events:none;}
.cat.A i.cat-icon{filter:drop-shadow(0 0 16px rgba(100,165,255,.95));color:rgba(140,195,255,.95);}
.cat.A svg{filter:drop-shadow(0 0 16px rgba(100,165,255,.95)) drop-shadow(0 0 5px rgba(100,165,255,.7));}
.cat.A .c-name{color:#fff;font-size:12px;}
.cat.B i.cat-icon,.cat.B svg{opacity:.5;}
.cat.B .c-name{opacity:.38;font-size:10px;}
.cat.C i.cat-icon,.cat.C svg{opacity:.22;}
.cat.C .c-name{opacity:.18;font-size:9.5px;}
.cat.D i.cat-icon,.cat.D svg{opacity:.08;}
.cat.D .c-name{opacity:.06;}
.cat.A::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:88px;height:88px;border-radius:50%;background:radial-gradient(circle,rgba(80,140,255,.14) 0%,transparent 70%);pointer-events:none;animation:catGl 2.2s ease-in-out infinite;}
@keyframes catGl{0%,100%{opacity:.5}50%{opacity:1}}

/* ITEMS */
#items{position:absolute;left:50%;transform:translateX(-50%) translateY(14px);display:flex;flex-direction:column;align-items:flex-start;gap:1px;min-width:310px;z-index:5;opacity:0;transition:opacity .22s ease,transform .22s ease;pointer-events:none;}
#items.vis{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.si{display:flex;align-items:center;gap:12px;padding:8px 18px;border-radius:3px;color:rgba(255,255,255,0.62);font-size:13px;cursor:pointer;transition:all .14s ease;width:100%;position:relative;}
.si.S{background:rgba(80,140,255,.2);color:#fff;}
.si.S::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2px;background:rgba(140,190,255,.85);border-radius:2px;}
.i-ico{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
.i-name{flex:1;text-shadow:0 1px 5px rgba(0,0,0,.9);}
.i-arr{font-size:10px;opacity:.2;transition:.15s;}
.si.S .i-arr{opacity:.65;transform:translateX(3px);}

/* BOTTOM LINE */
#bline{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(80,140,255,.6) 45%,rgba(180,215,255,.95) 50%,rgba(80,140,255,.6) 55%,transparent 100%);animation:bla 3s ease-in-out infinite;}
@keyframes bla{0%,100%{opacity:.5}50%{opacity:1}}
#catflash{position:absolute;inset:0;background:rgba(80,140,255,0);pointer-events:none;z-index:8;transition:background .08s;}

/* OVERLAY / APP */
#app-overlay{position:absolute;inset:0;background:rgba(0,10,28,0.96);z-index:50;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s ease;overflow:hidden;}
#app-overlay.show{opacity:1;pointer-events:all;}
.app-header{padding:28px 60px 16px;display:flex;align-items:center;gap:20px;border-bottom:1px solid rgba(80,140,255,.18);flex-shrink:0;}
.app-back{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;transition:.2s;padding:6px 10px;}
.app-back:hover{color:#fff;}
.app-back .pb-sm{width:17px;height:17px;border-radius:50%;background:#b51e1e;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;flex-shrink:0;}
.app-title{font-size:1.5rem;font-weight:300;letter-spacing:.5px;color:rgba(140,195,255,.9);flex:1;}
.app-inner{flex:1;overflow-y:auto;padding:36px 60px 36px;scrollbar-width:thin;scrollbar-color:rgba(80,140,255,.3) transparent;}
.app-inner::-webkit-scrollbar{width:4px}
.app-inner::-webkit-scrollbar-thumb{background:rgba(80,140,255,.3);border-radius:2px}

/* CONTENT STYLES */
.ps3-section-title{font-size:2rem;font-weight:300;margin-bottom:6px;color:#fff;}
.ps3-section-sub{color:rgba(255,255,255,.5);font-size:.9rem;margin-bottom:28px;line-height:1.5;}
.ps3-label{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:rgba(140,195,255,.7);margin-top:24px;margin-bottom:10px;}
.ps3-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 26px;background:rgba(80,140,255,.18);border:1px solid rgba(80,140,255,.45);color:#acd4ff;font-size:.9rem;font-family:inherit;cursor:pointer;text-decoration:none;transition:.2s;letter-spacing:.5px;}
.ps3-btn:hover{background:rgba(80,140,255,.35);border-color:rgba(140,195,255,.7);color:#fff;}
.ps3-btn.red{background:rgba(180,30,30,.18);border-color:rgba(200,60,60,.45);color:#ff9a9a;}
.ps3-btn.red:hover{background:rgba(180,30,30,.35);}
.ps3-btn.green{background:rgba(20,140,60,.18);border-color:rgba(40,180,80,.45);color:#8dffa8;}
.ps3-btn.green:hover{background:rgba(20,140,60,.35);}
.ps3-btn.pink{background:rgba(180,0,100,.2);border-color:rgba(255,0,150,.4);color:#ff80c8;}
.ps3-btn.pink:hover{background:rgba(180,0,100,.38);}
.ps3-btn.discord{background:rgba(88,101,242,.2);border-color:rgba(88,101,242,.5);color:#aab0ff;}
.ps3-btn.discord:hover{background:rgba(88,101,242,.38);}
.ps3-divider{height:1px;background:rgba(80,140,255,.12);margin:20px 0;}

/* Card grids */
.ps3-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;max-width:820px;}
.ps3-card{background:rgba(255,255,255,.04);border:1px solid rgba(80,140,255,.14);padding:18px;transition:.2s;}
.ps3-card:hover{border-color:rgba(80,140,255,.4);background:rgba(80,140,255,.07);}
.ps3-card-label{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:rgba(140,195,255,.5);margin-bottom:8px;}
.ps3-card-main{font-size:1.1rem;margin-bottom:4px;}
.ps3-card-sub{font-size:.82rem;color:rgba(255,255,255,.5);line-height:1.5;}
.ps3-bar{height:3px;background:rgba(255,255,255,.08);margin-top:12px;border-radius:2px;overflow:hidden;}
.ps3-bar-fill{height:100%;border-radius:2px;transition:.6s;}

/* Spec list */
.ps3-spec-list{list-style:none;max-width:520px;}
.ps3-spec-list li{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:.9rem;}
.ps3-spec-list li span:last-child{color:rgba(255,255,255,.5);}

/* Timeline */
.ps3-timeline{max-width:580px;}
.ps3-tl-entry{display:flex;gap:22px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.ps3-tl-year{font-size:.75rem;color:rgba(140,195,255,.5);font-family:monospace;width:80px;padding-top:3px;flex-shrink:0;}
.ps3-tl-name{font-size:1rem;margin-bottom:4px;}
.ps3-tl-desc{font-size:.82rem;color:rgba(255,255,255,.5);line-height:1.4;}
.ps3-tl-current{color:rgba(100,200,255,.9);}

/* Profile */
.ps3-profile-avatar{width:80px;height:80px;border:2px solid rgba(80,140,255,.5);display:flex;align-items:center;justify-content:center;font-size:2rem;background:rgba(80,140,255,.1);margin-bottom:18px;}
.ps3-profile-name{font-size:2.2rem;font-weight:300;margin-bottom:4px;}
.ps3-profile-domain{font-size:.8rem;color:rgba(140,195,255,.5);font-family:monospace;margin-bottom:24px;}
.ps3-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;}

/* Devlog */
.ps3-devlog-entry{padding:12px 18px;border-left:2px solid rgba(80,200,80,.4);background:rgba(0,180,0,.05);margin-bottom:10px;}
.ps3-devlog-date{font-size:.7rem;color:rgba(255,255,255,.35);font-family:monospace;margin-bottom:4px;}
.ps3-devlog-text{font-size:.9rem;line-height:1.5;}
.ps3-devlog-tag{display:inline-block;font-size:.65rem;padding:2px 8px;background:rgba(0,160,0,.25);color:#8dffa8;margin-top:7px;letter-spacing:1px;}

/* Music player */
.ps3-player{max-width:480px;background:rgba(255,255,255,.04);border:1px solid rgba(80,140,255,.16);padding:24px;}
.ps3-track-name{font-size:1.3rem;font-weight:300;margin-bottom:4px;}
.ps3-track-artist{font-size:.85rem;color:rgba(255,255,255,.45);margin-bottom:18px;}
.ps3-progress{height:2px;background:rgba(255,255,255,.12);margin-bottom:18px;cursor:pointer;}
.ps3-progress-fill{height:100%;background:rgba(180,100,255,.8);width:0%;transition:width .3s;}
.ps3-controls{display:flex;gap:12px;align-items:center;margin-bottom:18px;}
.ps3-ctrl-btn{background:transparent;border:1px solid rgba(80,140,255,.3);color:#acd4ff;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;transition:.2s;}
.ps3-ctrl-btn:hover{background:rgba(80,140,255,.2);border-color:rgba(140,195,255,.6);}
.ps3-ctrl-btn.play{width:46px;height:46px;background:rgba(140,80,255,.25);border-color:rgba(180,120,255,.5);color:#d4aeff;font-size:1.1rem;}
.ps3-ctrl-btn.play:hover{background:rgba(140,80,255,.45);}
.ps3-playlist{list-style:none;}
.ps3-playlist li{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem;cursor:pointer;display:flex;justify-content:space-between;transition:.14s;}
.ps3-playlist li:hover{background:rgba(80,140,255,.1);}
.ps3-playlist li.active{color:rgba(180,120,255,.9);background:rgba(140,80,255,.08);}
.ps3-playlist li .trk-artist{color:rgba(255,255,255,.35);font-size:.75rem;}

/* AI cards */
.ps3-ai-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;max-width:780px;}
.ps3-ai-card{background:rgba(255,255,255,.03);border:1px solid rgba(80,140,255,.1);padding:16px;transition:.2s;}
.ps3-ai-card:hover{border-color:rgba(140,195,255,.35);background:rgba(80,140,255,.07);}
.ps3-ai-icon{font-size:1.7rem;margin-bottom:6px;}
.ps3-ai-name{font-size:.9rem;font-weight:500;margin-bottom:4px;}
.ps3-ai-desc{font-size:.75rem;color:rgba(255,255,255,.45);line-height:1.4;}
.ps3-ai-badge{display:inline-block;font-size:.6rem;padding:2px 7px;background:rgba(80,140,255,.15);color:rgba(140,195,255,.7);margin-top:6px;letter-spacing:.5px;}

/* MakeIt */
.ps3-makeit-splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:45vh;text-align:center;}
.ps3-makeit-title{font-size:4rem;font-weight:900;letter-spacing:8px;text-transform:uppercase;background:linear-gradient(135deg,#ff6b35,#f7c59f,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;animation:glowPulse 3s ease infinite;}
@keyframes glowPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.ps3-makeit-sub{font-size:.95rem;color:rgba(255,255,255,.5);margin-bottom:26px;}

/* GitHub stats */
.ps3-gh-stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:22px;}
.ps3-gh-stat{background:rgba(255,255,255,.04);border:1px solid rgba(80,140,255,.14);padding:14px 22px;text-align:center;}
.ps3-gh-num{font-size:1.8rem;font-weight:300;color:rgba(140,195,255,.9);}
.ps3-gh-lbl{font-size:.7rem;color:rgba(255,255,255,.4);letter-spacing:1px;}

/* mob badge */
.ps3-win-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(45,137,239,.15);border:1px solid rgba(45,137,239,.4);padding:7px 14px;font-size:.85rem;color:rgba(140,195,255,.8);}

/* Toast */
#toast{position:fixed;bottom:60px;right:36px;z-index:300;background:rgba(10,18,40,.95);border:1px solid rgba(80,140,255,.35);padding:12px 22px;font-size:.88rem;opacity:0;transform:translateY(8px);transition:.3s;pointer-events:none;max-width:280px;color:rgba(255,255,255,.8);}
#toast.show{opacity:1;transform:translateY(0);}

/* Dynamic hints */
#hints{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:28px;z-index:10;transition:opacity .2s;}
.hint{display:flex;align-items:center;gap:7px;}
.pb{width:21px;height:21px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.pb.x{background:#1e4eb5;color:#fff}.pb.o{background:#b51e1e;color:#fff}.pb.t{background:#1e9e50;color:#fff}.pb.s{background:#555;color:#fff}
.hl{color:rgba(255,255,255,0.38);font-size:11px;}

/* App keyboard focus on buttons */
.ps3-btn.kb-focus,.ps3-ctrl-btn.kb-focus{outline:2px solid rgba(140,195,255,.8);outline-offset:3px;background:rgba(80,140,255,.38)!important;}
.ps3-playlist li.kb-focus{background:rgba(80,140,255,.22)!important;outline:1px solid rgba(140,195,255,.4);}

/* Scroll indicator */
#scroll-hint{position:absolute;right:28px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;align-items:center;gap:5px;opacity:0;transition:opacity .3s;pointer-events:none;}
#scroll-hint.vis{opacity:.5;}
.sh-arrow{font-size:12px;color:rgba(140,195,255,.8);animation:shBlink 1.2s ease-in-out infinite;}
.sh-arrow.down{animation-delay:.3s;}
@keyframes shBlink{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div id="ps3">
  <canvas id="bg"></canvas>

  <!-- BOOT -->
  <div id="boot">
    <div class="b-ring"><div class="b-ps3">PS3</div></div>
    <div class="b-sub">Masik · Portfolio</div>
    <div class="b-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="t-logo">Masik · mwkdev.pp.ua</div>
    <div class="t-right">
      <div class="t-user"><i class="fas fa-user"></i> Masik</div>
      <div class="t-clock"><div class="tc-time" id="clkT">00:00</div><div class="tc-date" id="clkD"></div></div>
    </div>
  </div>

  <!-- NAV -->
  <div id="nav-rail"></div>
  <div id="items"></div>

  <!-- HINTS -->
  <div id="hints"></div>
  <div id="bline"></div>
  <div id="catflash"></div>

  <!-- APP OVERLAY -->
  <div id="app-overlay">
    <div class="app-header">
      <div class="app-back" onclick="closeApp()"><span class="pb-sm">○</span>&nbsp; Назад</div>
      <div class="app-title" id="appTitle">—</div>
    </div>
    <div class="app-inner" id="app-content-area"></div>
  </div>

  <!-- Scroll hint -->
  <div id="scroll-hint">
    <div class="sh-arrow">▲</div>
    <div style="font-size:9px;color:rgba(140,195,255,.6);letter-spacing:1px;">SCROLL</div>
    <div class="sh-arrow down">▼</div>
  </div>

</div>
<div id="toast"></div>

<script>
// ─── CATEGORIES & ICONS ───────────────────────────────────────────────
const CATS = [
  {id:'profile',  label:'Профіль',    fa:'fas fa-user'},
  {id:'projects', label:'Проекти',    fa:'fas fa-gamepad'},
  {id:'devlog',   label:'Dev Log',    fa:'fas fa-terminal'},
  {id:'media',    label:'Медіа',      fa:'fas fa-photo-video'},
  {id:'hardware', label:'Залізо',     fa:'fas fa-microchip'},
  {id:'mobile',   label:'Мобайл',     fa:'fas fa-mobile-alt'},
  {id:'tools',    label:'AI Tools',   fa:'fas fa-robot'},
  {id:'network',  label:'Мережа',     fa:'fas fa-network-wired'},
  {id:'music',    label:'Музика',     fa:'fas fa-music'},
];

const ITEMS = {
  profile: [
    {ico:'👤', name:'Про Masik'},
    {ico:'🌐', name:'mwkdev.pp.ua'},
    {ico:'🇺🇦', name:'Країна · Україна'},
  ],
  projects: [
    {ico:'🎮', name:'MakeIt Havoc'},
    {ico:'🤖', name:'Discord Бот'},
    {ico:'🌐', name:'GitHub'},
  ],
  devlog: [
    {ico:'📋', name:'Devlog'},
  ],
  media: [
    {ico:'📺', name:'YouTube · @Mas1k52'},
    {ico:'✉️', name:'Mail'},
    {ico:'💬', name:'Discord · true.'},
  ],
  hardware: [
    {ico:'🖥️', name:'Desktop PC'},
    {ico:'📟', name:'PC Tablet SM-P585'},
    {ico:'📂', name:'OS Stack'},
  ],
  mobile: [
    {ico:'📱', name:'Mobile Modding'},
    {ico:'📱', name:'Redmi Note 8T'},
  ],
  tools: [
    {ico:'🤖', name:'AI Tools'},
  ],
  network: [
    {ico:'🌐', name:'GitHub · masik52xd'},
    {ico:'💬', name:'Discord Сервер'},
  ],
  music: [
    {ico:'🎵', name:'Плеєр'},
  ],
};

// ─── APP CONTENT ──────────────────────────────────────────────────────
function getContent(catId, itemIdx) {
  const itemName = (ITEMS[catId]||[])[itemIdx]?.name || '';

  if (catId === 'profile') return {
    title: 'Профіль — Masik',
    html: `
      <div class="ps3-profile-avatar"><i class="fas fa-user"></i></div>
      <div class="ps3-profile-name">Masik</div>
      <div class="ps3-profile-domain">mwkdev.pp.ua</div>
      <ul class="ps3-spec-list" style="max-width:480px">
        <li><span>Username</span><span>masik</span></li>
        <li><span>Країна</span><span>Україна</span></li>
        <li><span>Рід діяльності</span><span>Vibecoder · Modder · Content creator</span></li>
        <li><span>Головний проєкт</span><span>MakeIt Havoc</span></li>
        <li><span>Музика</span><span>Twin Atlantic, Beartooth.</span></li>
      </ul>
      <div class="ps3-links">
        <a href="https://github.com/masik52xd" target="_blank" class="ps3-btn"><i class="fab fa-github"></i> GitHub</a>

// ─── MUSIC PLAYER ─────────────────────────────────────────────────────
const tracks = [
  {title:'Overthinking',artist:'Twin Atlantic'},
  {title:'No Sleep',artist:'Twin Atlantic'},
  {title:'Mothertongue',artist:'Twin Atlantic'},
  {title:'Aggressive',artist:'Beartooth'},
  {title:'HMU',artist:'Tobias Dray'},
  {title:'STEAM SFX',artist:'prodbyxs'},
];
let currentTrack=0,playing=false,progressInterval=null,fakeProgress=0;
function initPlayer(){renderPlaylist();}
function renderPlaylist(){
  const ul=document.getElementById('playlist-ul');if(!ul)return;
  ul.innerHTML=tracks.map((t,i)=>`<li class="${i===currentTrack?'active':''}" onclick="selectTrack(${i})"><span>${t.title}</span><span class="trk-artist">${t.artist}</span></li>`).join('');
}
function selectTrack(i){currentTrack=i;playing=false;fakeProgress=0;clearInterval(progressInterval);updatePlayerUI();showWarningAndPlay();}
function updatePlayerUI(){
  const t=tracks[currentTrack];
  const nm=document.getElementById('pt-name'),ar=document.getElementById('pt-artist');
  if(nm)nm.textContent=t.artist+' — '+t.title;if(ar)ar.textContent=t.artist;
  const icon=document.getElementById('play-icon');if(icon)icon.className=playing?'fas fa-pause':'fas fa-play';
  renderPlaylist();
  const fill=document.getElementById('prog-fill');if(fill)fill.style.width=fakeProgress+'%';
}
function showWarningAndPlay(){showToast('⚠ Слухай офіційно в Spotify — поважай авторів!',4000);playing=true;startFakeProgress();updatePlayerUI();}
function togglePlay(){if(!playing)showWarningAndPlay();else{playing=false;clearInterval(progressInterval);updatePlayerUI();}}
function startFakeProgress(){clearInterval(progressInterval);progressInterval=setInterval(()=>{if(!playing)return;fakeProgress+=0.3;if(fakeProgress>=100){nextTrack();return;}const fill=document.getElementById('prog-fill');if(fill)fill.style.width=fakeProgress+'%';},100);}
function nextTrack(){currentTrack=(currentTrack+1)%tracks.length;fakeProgress=0;playing=true;startFakeProgress();updatePlayerUI();}
function prevTrack(){currentTrack=(currentTrack-1+tracks.length)%tracks.length;fakeProgress=0;playing=true;startFakeProgress();updatePlayerUI();}
window.selectTrack=selectTrack;window.togglePlay=togglePlay;window.nextTrack=nextTrack;window.prevTrack=prevTrack;

// ─── NAV ──────────────────────────────────────────────────────────────
const CAT_W=96;
let curCat=0,curItem=0,inItems=false;
const navEl=document.getElementById('nav-rail');
const itemsEl=document.getElementById('items');

function renderNav(){
  navEl.innerHTML='';
  const startLeft=window.innerWidth/2-(curCat*CAT_W)-(CAT_W/2);
  Object.assign(navEl.style,{position:'absolute',top:'50%',transform:'translateY(-50%)',left:startLeft+'px',transition:'left .32s cubic-bezier(.4,0,.2,1)',display:'flex',alignItems:'center',width:(CATS.length*CAT_W)+'px',pointerEvents:'all'});
  CATS.forEach((cat,i)=>{
    const d=Math.abs(i-curCat);
    const cls='cat '+(i===curCat?'A':d===1?'B':d===2?'C':'D');
    const el=document.createElement('div');
    el.className=cls;
    el.style.cssText=`width:${CAT_W}px;min-width:${CAT_W}px;`;
    el.innerHTML=`<div style="width:64px;height:64px;display:flex;align-items:center;justify-content:center;"><i class="cat-icon ${cat.fa}" style="font-size:36px;"></i></div><div class="c-name">${cat.label}</div>`;
    el.addEventListener('click',()=>{if(i!==curCat)flashCat();curCat=i;curItem=0;inItems=false;renderAll();});
    navEl.appendChild(el);
  });
}

function renderItems(){
  const list=ITEMS[CATS[curCat].id]||[];
  itemsEl.style.top=(window.innerHeight/2+78)+'px';
  itemsEl.innerHTML='';
  list.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='si'+(i===curItem&&inItems?' S':'');
    el.innerHTML=`<span class="i-ico">${item.ico}</span><span class="i-name">${item.name}</span><span class="i-arr">&#9658;</span>`;
    el.addEventListener('click',()=>{curItem=i;inItems=true;renderItems();setTimeout(()=>openApp(curCat,i),100);});
    itemsEl.appendChild(el);
  });
  itemsEl.classList.add('vis');
}

function renderAll(){renderNav();renderItems();}

function flashCat(){
  const fl=document.getElementById('catflash');
  fl.style.background='rgba(80,140,255,.07)';
  setTimeout(()=>{fl.style.background='rgba(80,140,255,0)';},130);
}

// ─── APP OPEN/CLOSE ───────────────────────────────────────────────────
const overlay=document.getElementById('app-overlay');
const contentArea=document.getElementById('app-content-area');
const appTitle=document.getElementById('appTitle');
const scrollHint=document.getElementById('scroll-hint');

// In-app keyboard focus state
let appMode=null; // null | 'scroll' | 'player' | 'buttons' | 'playlist'
let appFocusIdx=0;
let appCurrentCat=null;

function getAppFocusables(){
  if(appMode==='buttons') return Array.from(contentArea.querySelectorAll('.ps3-btn'));
  if(appMode==='playlist') return Array.from(contentArea.querySelectorAll('.ps3-playlist li'));
  if(appMode==='player') return Array.from(contentArea.querySelectorAll('.ps3-ctrl-btn'));
  return [];
}

function clearAppFocus(){
  contentArea.querySelectorAll('.kb-focus').forEach(el=>el.classList.remove('kb-focus'));
}

function applyAppFocus(){
  clearAppFocus();
  const els=getAppFocusables();
  if(els.length&&appFocusIdx>=0&&appFocusIdx<els.length){
    els[appFocusIdx].classList.add('kb-focus');
    els[appFocusIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

function initAppKeyboard(catId){
  appCurrentCat=catId;
  appFocusIdx=0;
  // Decide initial mode based on content
  if(catId==='music'){
    appMode='player';
  } else {
    const btns=contentArea.querySelectorAll('.ps3-btn');
    appMode=btns.length?'buttons':'scroll';
  }
  applyAppFocus();
  updateScrollHint();
  updateHints();
}

function updateScrollHint(){
  const inner=contentArea;
  if(inner.scrollHeight>inner.clientHeight+10&&appMode==='scroll'){
    scrollHint.classList.add('vis');
  } else {
    scrollHint.classList.remove('vis');
  }
}

function openApp(catIdx,itemIdx){
  const catId=CATS[catIdx].id;
  const content=getContent(catId,itemIdx);
  appTitle.textContent=content.title;
  contentArea.innerHTML=content.html;
  overlay.classList.add('show');
  navEl.style.opacity='0';navEl.style.pointerEvents='none';
  itemsEl.style.opacity='0';itemsEl.style.pointerEvents='none';
  if(content.onOpen==='music')initPlayer();
  setTimeout(()=>initAppKeyboard(catId),50);
}

function closeApp(){
  overlay.classList.remove('show');
  scrollHint.classList.remove('vis');
  appMode=null;appFocusIdx=0;appCurrentCat=null;
  setTimeout(()=>{
    navEl.style.opacity='';navEl.style.pointerEvents='';
    itemsEl.style.opacity='';itemsEl.style.pointerEvents='';
  },300);
  playing=false;clearInterval(progressInterval);
  updateHints();
}
window.closeApp=closeApp;

// ─── DYNAMIC HINTS ────────────────────────────────────────────────────
const hintsEl=document.getElementById('hints');
function hint(btn,cls,label){return `<div class="hint"><span class="pb ${cls}">${btn}</span><span class="hl">${label}</span></div>`;}

function updateHints(){
  if(overlay.classList.contains('show')){
    // inside app
    let h='';
    if(appMode==='scroll'){
      h+=hint('↑↓','s','Прокрутка');
      const hasBtns=contentArea.querySelectorAll('.ps3-btn').length>0;
      const hasPl=contentArea.querySelectorAll('.ps3-playlist li').length>0;
      const hasPl2=contentArea.querySelectorAll('.ps3-ctrl-btn').length>0;
      if(hasBtns) h+=hint('△','t','Кнопки');
      if(hasPl||hasPl2) h+=hint('□','s','Плеєр');
      h+=hint('○','o','Назад');
    } else if(appMode==='buttons'){
      h+=hint('←→','s','Вибір');
      h+=hint('✕','x','Відкрити');
      h+=hint('○','o','Назад/Скрол');
    } else if(appMode==='player'){
      h+=hint('←→','s','Трек');
      h+=hint('✕','x','Play/Pause');
      h+=hint('△','t','Плейлист');
      h+=hint('○','o','Назад');
    } else if(appMode==='playlist'){
      h+=hint('↑↓','s','Трек');
      h+=hint('✕','x','Вибрати');
      h+=hint('○','o','Плеєр');
    }
    hintsEl.innerHTML=h;
  } else if(inItems){
    hintsEl.innerHTML=hint('✕','x','Відкрити')+hint('↑','s','Вгору до категорій')+hint('○','o','Назад');
  } else {
    hintsEl.innerHTML=hint('←→','s','Категорія')+hint('↓','s','Елементи')+hint('✕','x','Вибрати');
  }
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const list=ITEMS[CATS[curCat].id]||[];

  // ── INSIDE APP ──
  if(overlay.classList.contains('show')){
    if(e.key==='Escape'||e.key==='Backspace'){
      // Escape from sub-modes back to scroll, then close
      if(appMode==='buttons'||appMode==='player'||appMode==='playlist'){
        clearAppFocus();
        if(appMode==='playlist') appMode='player';
        else appMode='scroll';
        applyAppFocus();
        updateScrollHint();
        updateHints();
      } else {
        closeApp();
      }
      e.preventDefault();return;
    }

    // scroll mode
    if(appMode==='scroll'){
      if(e.key==='ArrowDown'){contentArea.scrollBy({top:80,behavior:'smooth'});e.preventDefault();return;}
      if(e.key==='ArrowUp'){contentArea.scrollBy({top:-80,behavior:'smooth'});e.preventDefault();return;}
      // △ = switch to buttons
      if(e.key==='t'||e.key==='T'||e.key==='F3'){
        const btns=contentArea.querySelectorAll('.ps3-btn');
        if(btns.length){appMode='buttons';appFocusIdx=0;applyAppFocus();updateHints();}
        e.preventDefault();return;
      }
      // □ = switch to player/playlist
      if(e.key==='q'||e.key==='Q'||e.key==='F2'){
        if(contentArea.querySelectorAll('.ps3-ctrl-btn').length){appMode='player';appFocusIdx=1;applyAppFocus();updateHints();}
        e.preventDefault();return;
      }
    }

    // buttons mode
    if(appMode==='buttons'){
      const els=getAppFocusables();
      if(e.key==='ArrowRight'||e.key==='ArrowDown'){appFocusIdx=Math.min(appFocusIdx+1,els.length-1);applyAppFocus();e.preventDefault();return;}
      if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
        if(appFocusIdx===0){clearAppFocus();appMode='scroll';updateHints();}
        else appFocusIdx=Math.max(appFocusIdx-1,0);
        applyAppFocus();e.preventDefault();return;
      }
      if(e.key==='Enter'||e.key===' '){
        if(els[appFocusIdx]){els[appFocusIdx].click();}
        e.preventDefault();return;
      }
    }

    // player mode
    if(appMode==='player'){
      const els=getAppFocusables(); // ctrl buttons: prev, play, next
      if(e.key==='ArrowLeft'){appFocusIdx=Math.max(appFocusIdx-1,0);applyAppFocus();e.preventDefault();return;}
      if(e.key==='ArrowRight'){appFocusIdx=Math.min(appFocusIdx+1,els.length-1);applyAppFocus();e.preventDefault();return;}
      if(e.key==='Enter'||e.key===' '){if(els[appFocusIdx])els[appFocusIdx].click();e.preventDefault();return;}
      // △ = go to playlist
      if(e.key==='ArrowDown'||e.key==='t'||e.key==='T'){
        const pl=contentArea.querySelectorAll('.ps3-playlist li');
        if(pl.length){clearAppFocus();appMode='playlist';appFocusIdx=currentTrack;applyAppFocus();updateHints();}
        e.preventDefault();return;
      }
    }

    // playlist mode
    if(appMode==='playlist'){
      const els=getAppFocusables();
      if(e.key==='ArrowDown'){appFocusIdx=Math.min(appFocusIdx+1,els.length-1);applyAppFocus();e.preventDefault();return;}
      if(e.key==='ArrowUp'){
        if(appFocusIdx===0){clearAppFocus();appMode='player';appFocusIdx=1;applyAppFocus();updateHints();}
        else{appFocusIdx--;applyAppFocus();}
        e.preventDefault();return;
      }
      if(e.key==='Enter'||e.key===' '){if(els[appFocusIdx])els[appFocusIdx].click();e.preventDefault();return;}
    }

    e.preventDefault();
    return;
  }

  // ── MAIN NAV ──
  switch(e.key){
    case'ArrowRight':if(!inItems){flashCat();curCat=(curCat+1)%CATS.length;curItem=0;renderAll();}break;
    case'ArrowLeft':if(!inItems){flashCat();curCat=(curCat-1+CATS.length)%CATS.length;curItem=0;renderAll();}break;
    case'ArrowDown':if(!inItems){inItems=true;curItem=0;}else curItem=Math.min(curItem+1,list.length-1);renderAll();break;
    case'ArrowUp':if(inItems&&curItem===0){inItems=false;}else if(inItems)curItem=Math.max(curItem-1,0);renderAll();break;
    case'Enter':case' ':if(inItems)openApp(curCat,curItem);else{inItems=true;curItem=0;renderAll();}break;
    case'Escape':case'Backspace':if(inItems){inItems=false;renderAll();}break;
  }
  updateHints();
  e.preventDefault();
});

// ─── CLOCK ────────────────────────────────────────────────────────────
function tick(){
  const n=new Date();
  document.getElementById('clkT').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const days=['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
  document.getElementById('clkD').textContent=`${days[n.getDay()]}, ${String(n.getDate()).padStart(2,'0')}.${String(n.getMonth()+1).padStart(2,'0')}.${n.getFullYear()}`;
}
tick();setInterval(tick,1000);

// ─── TOAST ────────────────────────────────────────────────────────────
function showToast(msg,dur=3000){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);
}
window.showToast=showToast;

// ─── BG CANVAS ────────────────────────────────────────────────────────
const cv=document.getElementById('bg');
const cx=cv.getContext('2d');
let W,H,FR=0;
const waves=[
  {yFr:.35,amp:28,freq:.0028,spd:1.1,hue:210,al:.09},
  {yFr:.42,amp:18,freq:.0042,spd:.8,hue:220,al:.07},
  {yFr:.5,amp:22,freq:.0033,spd:1.3,hue:215,al:.06},
  {yFr:.58,amp:16,freq:.005,spd:.95,hue:205,al:.08},
  {yFr:.65,amp:26,freq:.0025,spd:.7,hue:225,al:.05},
];
const pts=Array.from({length:55},()=>({x:Math.random()*1920,y:Math.random()*1080,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.12,r:Math.random()*1.4+.5,ph:Math.random()*Math.PI*2,spd:.008+Math.random()*.012}));
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
function drawBg(){
  FR++;
  cx.fillStyle=`rgba(0,6,20,.88)`;cx.fillRect(0,0,W,H);
  const gr=cx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'rgba(0,10,40,.7)');gr.addColorStop(.5,'rgba(0,20,60,.45)');gr.addColorStop(1,'rgba(0,5,25,.8)');
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);
  waves.forEach(wv=>{
    const y0=wv.yFr*H,ph=FR*wv.spd*.01;
    cx.beginPath();cx.moveTo(0,y0+Math.sin(ph)*wv.amp);
    for(let x=0;x<=W;x+=5)cx.lineTo(x,y0+Math.sin(x*wv.freq+ph)*wv.amp);
    cx.strokeStyle=`hsla(${wv.hue},76%,68%,${wv.al})`;cx.lineWidth=1.1;cx.stroke();
  });
  {
    const y0=H*.5,ph=FR*.008;
    cx.beginPath();cx.moveTo(0,y0+Math.sin(ph)*24);
    for(let x=0;x<=W;x+=4)cx.lineTo(x,y0+Math.sin(x*.0034+ph)*24+Math.sin(x*.0078+ph*.72)*11);
    cx.strokeStyle=`rgba(80,152,255,${.13+.05*Math.sin(FR*.02)})`;cx.lineWidth=2;cx.stroke();
  }
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.ph+=p.spd;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(110,172,255,${.055+Math.sin(p.ph)*.045})`;cx.fill();
  });
  const g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.62);
  g.addColorStop(0,'rgba(0,18,55,.06)');g.addColorStop(1,'rgba(0,0,0,.52)');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  requestAnimationFrame(drawBg);
}
drawBg();

// ─── BOOT ─────────────────────────────────────────────────────────────
renderAll();
itemsEl.classList.remove('vis');
updateHints();
const bootEl=document.getElementById('boot');
setTimeout(()=>{
  bootEl.style.transition='opacity 1s ease';bootEl.style.opacity='0';
  setTimeout(()=>{bootEl.style.display='none';renderAll();},1000);
},2500);
</script>
